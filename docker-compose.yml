services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${ADMIN_USER}
      - N8N_BASIC_AUTH_PASSWORD=${ADMIN_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/shared
      - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=false
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./shared:/data/shared

  ollama:
    image: ollama/ollama:latest
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - LT_LOAD_ONLY=en,pt,es,ru
      - LT_UPDATE_MODELS=true
    volumes:
      - lt-local:/home/libretranslate/.local
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgvector:
    image: pgvector/pgvector:pg15
    container_name: pgvector
    restart: always
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=${DBV_USER}
      - POSTGRES_PASSWORD=${DBV_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  postgres:
    image: postgres:alpine
    container_name: postgres_alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-appdb}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres_alpine:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  lt-local:
